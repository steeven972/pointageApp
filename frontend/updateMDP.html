<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/utils.css">
    <link rel="stylesheet" href="styles/components/headerStyle.css">
    <link rel="stylesheet" href="styles/updateMDPStyle.css">
    <link rel="stylesheet" href="styles/components/buttonStyle.css">
    <title>Document</title>
</head>
<body>

    <header>
        <img src="/images/Logo_Biocoop_site_40_ans_244x68px_V2.png" alt="biocoop logo" style="height: 40px; margin-left: 20px;">
        <div id="username"></div>

        <div id="button-div">
            <button class="btn inverse" onclick="goToPointagePage()">Pointage</button>
            <button class="btn inverse" onclick="disconnection()">Déconnexion</button>
        </div>
    
    </header>
    <main>

        <h1>Modifier votre mot de passe</h1>
        <hr>
        <div id="form-div">
                <form id="passwordForm">
                <label for="oldPassword">Ancien mot de passe:</label>
                <input type="password" id="oldPassword" name="oldPassword" class="input-data" required><br><br>

                <label for="newPassword">Nouveau mot de passe:</label>
                <input type="password" id="newPassword" name="newPassword" class="input-data" required><br><br>

                <button type="submit" class="btn" onclick="updatePassword()">Changer le mot de passe</button>
            </form>
        </div>
    </main>
    
    <script src="js/utils.js"></script>
</body>
</html>
